author: "Diana"
delete-after: True
changes:
  - balance: "Adjustments were made to various tesla coils."
  - qol: "Tesla coils tell you their special effects, power loss, and power efficiency when examined."
  - qol: "Tesla coils can be changed to their various forms via screwdriver+multitool."
  - qol: "Tesla coils will no longer be shocked if unanchored near the tesla. This means you can ungrade a running tesla."
  - qol: "Geiger counters will play less frequently if in safe areas and at a lower volume."
  - qol: "Pumps (including volumetric) can be min/max'd with ctrl and alt click."
  - qol: "Makes the emergency shield use a battery instead of local power."
  - qol: "Hydromagnetic traps can now be made via R&D"
  - qol: "Mass driver buttons can be created."
  - qol: "Solar panels now take 2 seconds (from 5) to pry glass off, and takes toolspeed into account."
  - bugfix: "Supermatter once again emits passive rads at 0 power."
  - bugfix: "Infinite cells are EMP proof"
  - bugfix: "Radiation can no longer go negative. Again."
  - code_imp: "Huge air scrubbers now use a static var instead of global var."
  - qol: "Portable air pumps can pressurize tanks up to 3997kPA."
  - qol: "Geiger counter descriptions more clear if you're in danger or not."
  - maptweak: "Minitest tesla now starts ready to immediately be turned on."
  - code_imp: "Added some pre-mapped in variants of the tesla generator and PA parts for minitest."
  - bugfix: "Geiger counters no longer follow people."
  - bugfix: "Geiger counters work in inventory storage."
  - bugfix: "SM properly starts out at only requiring normal walls to block the rads it produces."
  - bugfix: "Deconstructing a canister wrenched to a port will unconnect it from the port."
  - bugfix: "Gets rid of a hard del with the 11 year old emergency shield"
  - bugfix: "Buttons now inform you of the correct commands that can be sent."
  - bugfix: "Mass drivers no longer BSOD when a multitool is used on them."