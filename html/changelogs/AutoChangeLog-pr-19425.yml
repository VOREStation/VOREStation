author: "Diana"
delete-after: True
changes:
  - bugfix: "You can no longer pull absorbed players out from a stomach via leash"
  - bugfix: "Swoopies can now eat again when their beak is picked up by another player."
  - bugfix: "You can no longer do CPR on yourself"
  - bugfix: "Cleaning shoes will make it so they don't leave tracks after cleaned."
  - bugfix: "Geiger counters will no longer set off motiontrackers if they are making no sound."
  - bugfix: "Incorporeal movement no longer bypasses stunned or paralysis."
  - bugfix: "Plastic flowers no longer gib people with pollen allergies."
  - bugfix: "Borg items no longer become colored if material"
  - bugfix: "Waste processor no longer makes reactions.\nfix; Teshari no longer use a default human rig backpack sprite."
  - bugfix: "Cyborg tools can no longer be found in xenoarch"
  - bugfix: "The replenishing urn is actually replenishing"
  - bugfix: "The two telecubes xenoarch can find are mated when spawned."
  - bugfix: "Admin 'drop everything' command works again."
  - bugfix: "Glowsticks and flares can not be turned off once on."
  - qol: "Xenoarch found organs tell you what they are."